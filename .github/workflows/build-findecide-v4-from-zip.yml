name: Build FinDecide v4 APK from ZIP

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK components
        run: |
          sdkmanager "platforms;android-36" "build-tools;36.0.0"

      - name: Locate and extract FinDecide source ZIP
        shell: bash
        run: |
          set -e
          ZIP_FILE="$(find "$GITHUB_WORKSPACE" -maxdepth 2 -type f -name 'FinDecide-Native-v4.0.0-Excellent-Source.zip' | head -n 1)"
          if [ -z "$ZIP_FILE" ]; then
            echo "FinDecide-Native-v4.0.0-Excellent-Source.zip was not found in the repository."
            exit 1
          fi

          rm -rf "$GITHUB_WORKSPACE/build-source"
          mkdir -p "$GITHUB_WORKSPACE/build-source"
          unzip -q "$ZIP_FILE" -d "$GITHUB_WORKSPACE/build-source"

          PROJECT_DIR="$(find "$GITHUB_WORKSPACE/build-source" -type f -name gradlew -printf '%h\n' | head -n 1)"
          if [ -z "$PROJECT_DIR" ]; then
            echo "Android project containing gradlew was not found inside the ZIP."
            exit 1
          fi

          echo "PROJECT_DIR=$PROJECT_DIR" >> "$GITHUB_ENV"
          echo "Android project: $PROJECT_DIR"

      - name: Compile, lint and assemble APK
        shell: bash
        run: |
          set -e
          cd "$PROJECT_DIR"
          chmod +x gradlew
          echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties
          ./gradlew --no-daemon clean lintDebug assembleDebug --stacktrace

      - name: Prepare named APK
        shell: bash
        run: |
          set -e
          cp "$PROJECT_DIR/app/build/outputs/apk/debug/app-debug.apk"              "$GITHUB_WORKSPACE/FinDecide-Native-v4.0.0.apk"
          test -s "$GITHUB_WORKSPACE/FinDecide-Native-v4.0.0.apk"
          ls -lh "$GITHUB_WORKSPACE/FinDecide-Native-v4.0.0.apk"

      - name: Upload installable APK
        uses: actions/upload-artifact@v4
        with:
          name: FinDecide-Native-v4.0.0-APK
          path: FinDecide-Native-v4.0.0.apk
          if-no-files-found: error
          retention-days: 30

      - name: Upload build reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: FinDecide-v4-build-reports
          path: |
            ${{ env.PROJECT_DIR }}/app/build/reports/**
            ${{ env.PROJECT_DIR }}/app/build/outputs/logs/**
          if-no-files-found: ignore
          retention-days: 14
